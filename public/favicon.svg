<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0a0a0a"/>

  <!-- Outer circle border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#D4B896" stroke-width="2"/>

  <!-- Stylized "e" for elpaso -->
  <g transform="translate(16, 20)">
    <!-- Vertical line -->
    <line x1="8" y1="4" x2="8" y2="24" stroke="#D4B896" stroke-width="2" stroke-linecap="round"/>

    <!-- Horizontal lines -->
    <line x1="8" y1="4" x2="16" y2="4" stroke="#D4B896" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="14" x2="16" y2="14" stroke="#D4B896" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="24" x2="16" y2="24" stroke="#D4B896" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Accent dot in cyan -->
  <circle cx="32" cy="32" r="2" fill="#00D9FF"/>
</svg>
